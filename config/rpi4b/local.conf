# =============================================================
# local.conf — RPi 4 Model B (Server)
#
# This file is minimal. All system policy (systemd, features,
# packages, security) is defined in the distro config:
#   meta-home-monitor/conf/distro/home-monitor.conf
# =============================================================

# --- Machine ---
MACHINE = "raspberrypi4-64"

# --- Distribution ---
DISTRO = "home-monitor"

# --- Parallel build (auto-patched by build.sh) ---
BB_NUMBER_THREADS = "8"
PARALLEL_MAKE = "-j 8"

# --- Shared caches ---
DL_DIR = "${TOPDIR}/../downloads"
SSTATE_DIR = "${TOPDIR}/../sstate-cache"

# --- RPi 4B hardware settings ---
ENABLE_UART = "1"
GPU_MEM = "128"
RASPBERRYPI_CAMERA_V2 = "1"
ENABLE_I2C = "1"
ENABLE_SPI_BUS = "1"
MACHINE_EXTRA_RRECOMMENDS += "linux-firmware-rpidistro-bcm43455"
KERNEL_IMAGETYPE = "Image"

# --- OTA signing (ADR-0014) ---
# Distro default is SWUPDATE_SIGNING="1" (enforced everywhere — dev and prod
# both ship with CONFIG_SIGNED_IMAGES=y). Override here only for one-off
# unsigned experiments; otherwise leave the distro default.
# Run ./scripts/generate-ota-keys.sh once per developer to populate
# ~/.monitor-keys/ota-signing.{key,crt} before the first build.
