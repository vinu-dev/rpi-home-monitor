# =============================================================
# local.conf — RPi 4 Model B (Server)
#
# This file is minimal. All system policy (systemd, features,
# packages, security) is defined in the distro config:
#   meta-home-monitor/conf/distro/home-monitor.conf
# =============================================================

# --- Machine ---
MACHINE = "raspberrypi4-64"

# --- Distribution ---
DISTRO = "home-monitor"

# --- Parallel build (auto-patched by build.sh) ---
BB_NUMBER_THREADS = "8"
PARALLEL_MAKE = "-j 8"

# --- Shared caches ---
DL_DIR = "${TOPDIR}/../downloads"
SSTATE_DIR = "${TOPDIR}/../sstate-cache"

# --- RPi 4B hardware settings ---
ENABLE_UART = "1"
GPU_MEM = "128"
RASPBERRYPI_CAMERA_V2 = "1"
ENABLE_I2C = "1"
ENABLE_SPI_BUS = "1"
MACHINE_EXTRA_RRECOMMENDS += "linux-firmware-rpidistro-bcm43455"
KERNEL_IMAGETYPE = "Image"

# --- OTA signing (ADR-0014) ---
# "0" = dev: CONFIG_SIGNED_IMAGES disabled, unsigned bundles accepted (default)
# "1" = prod: CONFIG_SIGNED_IMAGES enabled, bundles must be signed with
#             ~/.monitor-keys/ota-signing.key (run ./scripts/generate-ota-keys.sh first)
SWUPDATE_SIGNING = "0"

# =============================================================
# Container runtime (Podman) — server-only
#
# Scope: this entire block lives in the SERVER local.conf, NOT the
# distro config (meta-home-monitor/conf/distro/home-monitor.conf),
# so the Pi Zero 2W camera build (zero2w/local.conf) is unaffected.
# Adding `virtualization` to DISTRO_FEATURES on the camera would
# pull in container runtime build dependencies it cannot fit
# (176 MB usable RAM).
# =============================================================
DISTRO_FEATURES:append = " virtualization"

# Reuse the RPi BSP kernel (linux-raspberrypi). Container support
# comes via a kernel config fragment (docker.cfg) wired in only on
# raspberrypi4-64; see meta-home-monitor/recipes-kernel/linux/linux-raspberrypi_%.bbappend.
