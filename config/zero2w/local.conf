# =============================================================
# local.conf — RPi Zero 2W (Camera Node)
#
# This file is minimal. All system policy (systemd, features,
# packages, security) is defined in the distro config:
#   meta-home-monitor/conf/distro/home-monitor.conf
# =============================================================

# --- Machine ---
MACHINE = "home-monitor-camera"

# --- Distribution ---
DISTRO = "home-monitor"

# --- Parallel build (auto-patched by build.sh) ---
BB_NUMBER_THREADS = "8"
PARALLEL_MAKE = "-j 8"

# --- Shared caches ---
DL_DIR = "${TOPDIR}/../downloads"
SSTATE_DIR = "${TOPDIR}/../sstate-cache"

# --- RPi Zero 2W hardware settings ---
ENABLE_UART = "1"
GPU_MEM = "128"
# PiHut ZeroCam = OV5647 (Camera V1). Do NOT use RASPBERRYPI_CAMERA_V2
# (that adds imx219 overlay which is wrong for this sensor).
RASPBERRYPI_CAMERA = "1"
MACHINE_EXTRA_RRECOMMENDS += "linux-firmware-rpidistro-bcm43436s"
KERNEL_IMAGETYPE = "Image"

# --- OTA signing (ADR-0014) ---
# "0" = dev: CONFIG_SIGNED_IMAGES disabled, unsigned bundles accepted (default)
# "1" = prod: CONFIG_SIGNED_IMAGES enabled, bundles must be signed with
#             ~/.monitor-keys/ota-signing.key (run ./scripts/generate-ota-keys.sh first)
SWUPDATE_SIGNING = "0"
