openapi: 3.0.3
info:
  title: RPi Home Monitor Camera API
  version: "1.1"
servers:
  - url: https://127.0.0.1:5444
components:
  securitySchemes:
    cameraSession:
      type: apiKey
      in: cookie
      name: cam_session
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    CameraLoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
    CameraStatus:
      type: object
      required:
        [
          camera_id,
          hostname,
          ip_address,
          wifi_ssid,
          server_address,
          server_connected,
          streaming,
          paired,
          cpu_temp,
          uptime,
          memory_total_mb,
          memory_used_mb,
          hardware_ok,
          hardware_error,
        ]
      properties:
        camera_id:
          type: string
        hostname:
          type: string
        ip_address:
          type: string
        wifi_ssid:
          type: string
        server_address:
          type: string
        server_connected:
          type: boolean
        streaming:
          type: boolean
        paired:
          type: boolean
        cpu_temp:
          type: number
        uptime:
          type: string
        memory_total_mb:
          type: integer
        memory_used_mb:
          type: integer
        hardware_ok:
          type: boolean
          description: |
            False when the CaptureManager couldn't open the V4L2 device
            (typically "no camera module detected"). Surfaced as a
            banner on the camera status page + server dashboard.
        hardware_error:
          type: string
          description: |
            Short, user-facing description of the hardware fault.
            Empty when hardware_ok=true.
    NetworkList:
      type: object
      required: [networks]
      properties:
        networks:
          type: array
          items:
            type: object
            properties:
              ssid:
                type: string
              signal:
                type: integer
    WifiRequest:
      type: object
      required: [ssid, password]
      properties:
        ssid:
          type: string
        password:
          type: string
    PasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string
    PairRequest:
      type: object
      required: [pin, server_url]
      properties:
        pin:
          type: string
        server_url:
          type: string
    StreamStateResponse:
      type: object
      required: [state, running]
      description: |
        Response shape for the ADR-0017 on-demand control endpoints. `state`
        is the persisted desired stream state (written atomically to
        `/data/config/stream_state`); `running` reflects whether the
        libcamera + ffmpeg pipeline is actually up right now.
      properties:
        state:
          type: string
          enum: [running, stopped]
        running:
          type: boolean
    Heartbeat:
      type: object
      description: |
        Periodic health payload pushed by the camera to the server
        (ADR-0016). ADR-0017 extends it with `stream_state` and
        `recording_state` so the server can detect drift between what it
        asked the camera to do and what the camera thinks it is doing.
      required: [camera_id]
      properties:
        camera_id:
          type: string
        streaming:
          type: boolean
          description: |
            Legacy boolean — true iff the RTSP pipeline is active. Retained
            for back-compat with older servers; new code should prefer
            `stream_state`.
        stream_state:
          type: string
          enum: [running, stopped]
          description: |
            Persisted desired stream state (ADR-0017). Supplements the
            legacy `streaming` field; the server treats these as consistent
            when `running` == `streaming`.
        recording_state:
          type: object
          description: Mirror of what the server last asked the camera to record.
          properties:
            mode:
              type: string
              enum: [off, continuous, schedule, motion]
            recording_now:
              type: boolean
        cpu_temp:
          type: number
        memory_percent:
          type: integer
        uptime_seconds:
          type: integer
        hardware_ok:
          type: boolean
          description: |
            False when the camera has any active hardware fault.
            Legacy field; prefer `hardware_faults` per ADR-0023.
        hardware_error:
          type: string
          description: |
            Short, user-facing fault string. Empty when hardware_ok=true.
            Legacy field; prefer `hardware_faults` per ADR-0023.
        hardware_faults:
          type: array
          description: |
            Structured list of active hardware faults (ADR-0023).
            Empty when healthy. Each entry describes one concurrent
            fault: code + severity + short message + longer hint.
          items:
            type: object
            required: [code, severity, message]
            properties:
              code:
                type: string
              severity:
                type: string
                enum: [info, warning, error, critical]
              message:
                type: string
              hint:
                type: string
              context:
                type: object
paths:
  /login:
    post:
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CameraLoginRequest"
      responses:
        "200":
          description: Camera login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/status:
    get:
      tags: [status]
      security:
        - cameraSession: []
      responses:
        "200":
          description: Camera status summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CameraStatus"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/networks:
    get:
      tags: [wifi]
      security:
        - cameraSession: []
      responses:
        "200":
          description: WiFi networks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkList"
  /api/wifi:
    post:
      tags: [wifi]
      security:
        - cameraSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WifiRequest"
      responses:
        "200":
          description: WiFi updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/password:
    post:
      tags: [auth]
      security:
        - cameraSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Current password incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/factory-reset:
    post:
      tags: [system]
      security:
        - cameraSession: []
      responses:
        "200":
          description: Factory reset triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /pair:
    post:
      tags: [pairing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairRequest"
      responses:
        "200":
          description: Pairing successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Pairing failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/control/stream/start:
    post:
      tags: [control]
      summary: Start the camera RTSP pipeline (ADR-0017).
      description: |
        mTLS-gated (HMAC-signed body, same scheme as ADR-0015 `config-notify`).
        Idempotent: calling `start` on an already-running camera is a no-op
        that returns the current state. The desired state is persisted to
        `/data/config/stream_state` atomically so a reboot honours the last
        explicit intent.
      responses:
        "200":
          description: Stream is running (either just started or was already up).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamStateResponse"
        "401":
          description: HMAC signature missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/control/stream/stop:
    post:
      tags: [control]
      summary: Stop the camera RTSP pipeline (ADR-0017).
      description: |
        mTLS-gated (HMAC-signed body). Idempotent. Persists `stopped` to
        `/data/config/stream_state`.
      responses:
        "200":
          description: Stream is stopped.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamStateResponse"
        "401":
          description: HMAC signature missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/control/stream/state:
    get:
      tags: [control]
      summary: Report the current camera stream state (ADR-0017).
      description: |
        mTLS-gated. Returns the persisted desired state plus the live
        `running` flag from the stream pipeline. Used by the server on
        reconnect to detect drift.
      responses:
        "200":
          description: Stream state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamStateResponse"
        "401":
          description: HMAC signature missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
