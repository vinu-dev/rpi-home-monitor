# REQ: SWR-006, SWR-031, SWR-050; RISK: RISK-001, RISK-017; SEC: SC-016, SC-019; TEST: TC-001, TC-028, TC-044
# mediamtx configuration for Home Monitor
# Receives RTSP pushes from cameras, republishes for server consumption

###############################################
# General
###############################################
logLevel: info
logDestinations: [stdout]

# API disabled (not needed)
api: no

###############################################
# RTSP server
###############################################
# Accept RTSP streams from cameras
rtspAddress: :8554
rtsp: yes

# TCP only (reliable over WiFi)
rtspTransports: [tcp]

###############################################
# RTSPS server (mTLS — camera authentication)
###############################################
# Encrypted RTSP with mutual TLS for paired cameras.
# Cameras present client cert signed by our CA during TLS handshake.
# Unpaired cameras cannot stream (no valid client cert).
#
# encryption: optional allows both RTSP (localhost) and RTSPS (cameras).
# Server-side services (ffmpeg recorders) connect on plain RTSP locally.
# Cameras connect on RTSPS with client certificates.
encryption: optional
rtspsAddress: :8322
serverCert: /data/certs/server.crt
serverKey: /data/certs/server.key

###############################################
# HLS server
###############################################
# Disable built-in HLS — we use ffmpeg for more control
hls: no

###############################################
# WebRTC (WHEP — primary live view transport)
###############################################
# Enables sub-second live view via browser RTCPeerConnection.
# WHEP endpoint: POST /<stream-path>/whep (SDP offer/answer)
# Proxied through nginx at /webrtc/<stream-path>/whep
webrtc: yes
webrtcAddress: :8889

# ICE candidates — local network only (no STUN/TURN needed for LAN)
webrtcICEServers2: []
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: ""

###############################################
# Recording
###############################################
# Disable built-in recording — we use ffmpeg for 3-min segments
pathDefaults:
  record: no

###############################################
# Paths
###############################################
# Accept any stream path (cameras push to their own cam-ID path).
#
# ADR-0017: on-demand viewer-driven streaming.
# When a WebRTC viewer connects (first reader), runOnDemand fires the
# mediamtx-on-demand.sh hook which calls the server's localhost-only
# coordinator to ask the camera to start streaming. When the last reader
# leaves plus `runOnDemandCloseAfter`, the stop hook fires.
#
# We also wire runOnReady / runOnNotReady as a belt-and-braces fallback
# on MediaMTX builds where runOnDemand only triggers on the publisher
# side. Both are idempotent on the server side, so duplicate calls are safe.
paths:
  all_others:
    runOnDemand: /opt/monitor/bin/mediamtx-on-demand.sh $MTX_PATH start
    runOnDemandCloseAfter: 15s
    runOnReady: /opt/monitor/bin/mediamtx-on-demand.sh $MTX_PATH start
    runOnNotReady: /opt/monitor/bin/mediamtx-on-demand.sh $MTX_PATH stop
