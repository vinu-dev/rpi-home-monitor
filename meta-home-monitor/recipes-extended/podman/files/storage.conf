# /etc/containers/storage.conf — Home Monitor server
#
# Pins the podman / buildah / skopeo image+container store to
# /data/containers so pulled images survive OTA rootfs A/B swaps.
# Without this, every OTA would wipe pulled images and force a
# re-pull of every add-on stack on next boot.
#
# /data is mmcblk0p4 (ext4), mounted via fstab entries injected
# in home-monitor-image.inc. The directory is created by
# /usr/lib/tmpfiles.d/hm-containers.conf on first boot.

[storage]
driver = "overlay"
runroot = "/run/containers/storage"
graphroot = "/data/containers/storage"

[storage.options]
# pull_options.use_hard_links = "true"  # space saving on small media

[storage.options.overlay]
# overlayfs in kernel works for rootful; rootless falls back to
# fuse-overlayfs automatically when CAP_SYS_ADMIN is unavailable.
mountopt = "nodev,metacopy=on"
