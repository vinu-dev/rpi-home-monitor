# =============================================================
# docker.cfg — Kernel options required by Podman/Docker
#
# Applied via linux-raspberrypi_%.bbappend on raspberrypi4-64 only.
# The Pi Zero 2W camera build does NOT use this fragment.
#
# These mirror the upstream Docker / Moby kernel-requirements list
# (https://github.com/moby/moby/blob/master/contrib/check-config.sh)
# trimmed to what's actually needed for our use cases:
#   - rootless podman (user namespaces + slirp4netns + fuse-overlayfs)
#   - rootful compose stacks (bridge networking + iptables)
#   - cgroups v2 (the only mode podman 4.x runs in)
#
# Most of these are already enabled in the rpi BSP defconfig; this
# fragment exists to make the requirement explicit and fail the build
# loudly if upstream ever drops one. kernel_configcheck warns if any
# requested option ends up =n in the merged .config.
# =============================================================

# --- Cgroups v2 + controllers ---
CONFIG_CGROUPS=y
CONFIG_CGROUP_SCHED=y
CONFIG_CGROUP_PIDS=y
CONFIG_CGROUP_FREEZER=y
CONFIG_CGROUP_DEVICE=y
CONFIG_CPUSETS=y
CONFIG_MEMCG=y
CONFIG_MEMCG_SWAP=y
CONFIG_BLK_CGROUP=y
CONFIG_CGROUP_BPF=y

# --- All namespaces ---
CONFIG_NAMESPACES=y
CONFIG_UTS_NS=y
CONFIG_IPC_NS=y
CONFIG_USER_NS=y
CONFIG_PID_NS=y
CONFIG_NET_NS=y

# --- Overlay filesystem (rootful storage driver) ---
CONFIG_OVERLAY_FS=y

# --- FUSE (rootless via fuse-overlayfs) ---
CONFIG_FUSE_FS=y

# --- Bridge networking + netfilter (default container network) ---
CONFIG_BRIDGE=y
CONFIG_BRIDGE_NETFILTER=y
CONFIG_VLAN_8021Q=y
CONFIG_VETH=y

# --- iptables / netfilter for port publishing & masquerade ---
CONFIG_NETFILTER=y
CONFIG_NETFILTER_ADVANCED=y
CONFIG_NF_NAT=y
CONFIG_IP_NF_FILTER=y
CONFIG_IP_NF_NAT=y
CONFIG_IP_NF_TARGET_MASQUERADE=y
CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
CONFIG_NETFILTER_XT_MATCH_IPVS=y
CONFIG_NETFILTER_XT_MARK=y
CONFIG_NF_CONNTRACK=y
CONFIG_NF_CONNTRACK_NETLINK=y

# --- Required by container runtimes / process tooling ---
CONFIG_KEYS=y
CONFIG_SECCOMP=y
CONFIG_SECCOMP_FILTER=y
CONFIG_POSIX_MQUEUE=y

# --- Useful but optional: tmpfs xattrs (selinux-style labels in tmpfs) ---
CONFIG_TMPFS_XATTR=y
CONFIG_TMPFS_POSIX_ACL=y
