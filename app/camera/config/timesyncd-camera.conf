# REQ: SWR-024; RISK: RISK-012; SEC: SC-012; TEST: TC-023
# Camera-only NTP drop-in (ADR-0019)
#
# Prefer the home-monitor server as the time source so every camera
# on the LAN shares a clock with the server that indexes its clips.
# Upstream NTP pools remain as fallbacks for when the server is down
# or not yet reachable (first boot, post-OTA, AP mode).
#
# Lives at /etc/systemd/timesyncd.conf.d/10-home-camera.conf and is
# lexically ordered AFTER the shared 00-home-monitor.conf, so
# systemd-timesyncd applies these servers first.
[Time]
NTP=rpi-divinu.local
FallbackNTP=time.google.com time.cloudflare.com pool.ntp.org
