{% extends "base.html" %}

{% block title %}Live View - Home Monitor{% endblock %}

{% block content %}
<h1 class="page-title">Live View</h1>

<!-- Camera Selector -->
<div class="form-group">
    <label for="live-camera-select">Camera</label>
    <select id="live-camera-select" class="form-input">
        <option value="">Loading cameras...</option>
    </select>
</div>

<!-- Video Player -->
<div class="video-container" id="live-video-container">
    <video id="live-video" autoplay muted playsinline></video>
    <div class="video-overlay" id="live-overlay">
        <span id="live-overlay-text">Select a camera</span>
    </div>
</div>

<!-- Controls -->
<div class="flex-between mt-8">
    <span id="live-stream-status" class="text-muted text-small"></span>
    <!-- Player controls. The <video> element deliberately has no
         native ``controls`` attribute (issue #96) — the dark theme
         conflicts with native bars and the custom buttons need
         disabled-gating on stream state. Icons are text glyphs to
         avoid shipping an SVG icon set for four buttons. -->
    <div class="live-controls">
        <button class="btn btn--secondary btn--small" id="btn-mute"
                disabled aria-label="Toggle sound" title="Toggle sound">
            <span id="btn-mute-icon">&#x1F507;</span>
        </button>
        <button class="btn btn--secondary btn--small" id="btn-pip"
                disabled aria-label="Picture in picture" title="Picture in picture">
            &#x2B1A;
        </button>
        <button class="btn btn--secondary btn--small" id="btn-fullscreen"
                disabled aria-label="Fullscreen" title="Fullscreen">
            <span id="btn-fullscreen-icon">&#x26F6;</span>
        </button>
        <button class="btn btn--secondary btn--small" id="btn-snapshot" disabled>Snapshot</button>
    </div>
</div>

<!-- Camera Info -->
<div class="card mt-16 camera-info" id="live-camera-info" style="display:none;">
    <div class="camera-info__row">
        <span class="camera-info__label">Name</span>
        <span class="camera-info__value" id="info-name">--</span>
    </div>
    <div class="camera-info__row">
        <span class="camera-info__label">Resolution</span>
        <span class="camera-info__value" id="info-resolution">--</span>
    </div>
    <div class="camera-info__row">
        <span class="camera-info__label">FPS</span>
        <span class="camera-info__value" id="info-fps">--</span>
    </div>
    <div class="camera-info__row">
        <span class="camera-info__label">IP Address</span>
        <span class="camera-info__value" id="info-ip">--</span>
    </div>
    <div class="camera-info__row">
        <span class="camera-info__label">Status</span>
        <span class="camera-info__value" id="info-status">--</span>
    </div>
    <div class="camera-info__row" style="border-bottom:none;">
        <span class="camera-info__label">Recording Mode</span>
        <span class="camera-info__value" id="info-recording">--</span>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/hls.min.js') }}"></script>
<script>
/**
 * Live View Player — WebRTC-first with HLS fallback.
 *
 * Cascade: WebRTC (WHEP, sub-1s) → HLS.js (10-15s) → native HLS (Safari)
 * WebRTC uses MediaMTX WHEP endpoint via nginx /webrtc/ proxy.
 */
(function() {
    var videoEl = document.getElementById('live-video');
    var overlay = document.getElementById('live-overlay');
    var overlayText = document.getElementById('live-overlay-text');
    var selectEl = document.getElementById('live-camera-select');
    var btnSnapshot = document.getElementById('btn-snapshot');
    var btnMute = document.getElementById('btn-mute');
    var btnMuteIcon = document.getElementById('btn-mute-icon');
    var btnPip = document.getElementById('btn-pip');
    var btnFullscreen = document.getElementById('btn-fullscreen');
    var statusEl = document.getElementById('live-stream-status');
    var infoPanel = document.getElementById('live-camera-info');

    // Player-control buttons share the same enabled/disabled state as
    // Snapshot (enabled only while a stream is live). Centralised here so
    // the cascade (WebRTC → HLS.js → native HLS) + destroyStream() all
    // toggle a single helper.
    function setControlsEnabled(enabled) {
        btnSnapshot.disabled = !enabled;
        btnMute.disabled = !enabled;
        // PiP: only enable where the browser supports it.
        var pipSupported = 'pictureInPictureEnabled' in document &&
                           document.pictureInPictureEnabled;
        btnPip.disabled = !(enabled && pipSupported);
        // Fullscreen: universal support — enable if a stream is live.
        btnFullscreen.disabled = !enabled;
    }

    var peerConnection = null;
    var hlsInstance = null;
    var cameras = [];
    var currentTransport = '';  // 'webrtc' or 'hls'

    // WHEP timeout — if WebRTC doesn't connect in 5s, fall back to HLS.
    // On-demand streaming (ADR-0017) adds ~3-5 s camera warm-up on the first
    // viewer open; the overlay text below communicates that.
    var WHEP_TIMEOUT_MS = 5000;

    function showOverlay(msg) {
        overlayText.textContent = msg;
        overlay.classList.remove('hidden');
    }

    function hideOverlay() {
        overlay.classList.add('hidden');
    }

    // ---- Camera loading ----

    function loadCameras() {
        window.HM.api.get('/api/v1/cameras')
            .then(function(data) {
                cameras = data || [];
                selectEl.innerHTML = '';

                if (cameras.length === 0) {
                    var opt = document.createElement('option');
                    opt.value = '';
                    opt.textContent = 'No cameras available';
                    selectEl.appendChild(opt);
                    showOverlay('No cameras available');
                    return;
                }

                cameras.forEach(function(cam) {
                    var opt = document.createElement('option');
                    opt.value = cam.id;
                    opt.textContent = (cam.name || cam.id) + ' (' + cam.status + ')';
                    selectEl.appendChild(opt);
                });

                var params = new URLSearchParams(window.location.search);
                var camParam = params.get('camera');
                if (camParam) selectEl.value = camParam;

                if (selectEl.value) {
                    startStream(selectEl.value);
                } else {
                    selectEl.selectedIndex = 0;
                    startStream(cameras[0].id);
                }
            })
            .catch(function() {
                showOverlay('Failed to load cameras');
            });
    }

    function findCamera(id) {
        for (var i = 0; i < cameras.length; i++) {
            if (cameras[i].id === id) return cameras[i];
        }
        return null;
    }

    function updateCameraInfo(cam) {
        if (!cam) { infoPanel.style.display = 'none'; return; }
        infoPanel.style.display = '';
        document.getElementById('info-name').textContent = cam.name || cam.id;
        document.getElementById('info-resolution').textContent = cam.resolution || '--';
        document.getElementById('info-fps').textContent = cam.fps || '--';
        document.getElementById('info-ip').textContent = cam.ip || '--';
        document.getElementById('info-status').textContent = cam.status || '--';
        document.getElementById('info-recording').textContent = cam.recording_mode || '--';
    }

    // ---- Stream lifecycle ----

    function destroyStream() {
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        if (hlsInstance) {
            hlsInstance.destroy();
            hlsInstance = null;
        }
        videoEl.srcObject = null;
        videoEl.removeAttribute('src');
        videoEl.load();
        setControlsEnabled(false);
        statusEl.textContent = '';
        currentTransport = '';
    }

    function startStream(cameraId) {
        destroyStream();

        var cam = findCamera(cameraId);
        updateCameraInfo(cam);

        if (!cam) { showOverlay('Camera not found'); return; }
        if (cam.status !== 'online') { showOverlay('Camera offline'); return; }

        statusEl.textContent = 'Connecting (WebRTC)...';
        // ADR-0017: cameras are idle by default; MediaMTX `runOnDemand` hook
        // asks the camera to start streaming on first reader — this can take
        // up to ~5 s for the sensor + encoder to warm up. Tell the user.
        showOverlay('Starting stream... (camera warming up)');

        // Try WebRTC first, fall back to HLS on failure
        startWebRTC(cameraId).catch(function(err) {
            console.warn('WebRTC failed, falling back to HLS:', err);
            startHLS(cameraId);
        });
    }

    // ---- WebRTC via WHEP ----

    function startWebRTC(cameraId) {
        return new Promise(function(resolve, reject) {
            if (typeof RTCPeerConnection === 'undefined') {
                reject(new Error('RTCPeerConnection not available'));
                return;
            }

            var whepUrl = '/webrtc/' + encodeURIComponent(cameraId) + '/whep';
            var pc = new RTCPeerConnection({
                iceServers: []  // LAN only, no STUN/TURN
            });
            peerConnection = pc;

            // Timeout — if no video track arrives, fall back
            var timeout = setTimeout(function() {
                if (currentTransport !== 'webrtc') {
                    pc.close();
                    peerConnection = null;
                    reject(new Error('WHEP timeout'));
                }
            }, WHEP_TIMEOUT_MS);

            // Receive video track from MediaMTX
            pc.addTransceiver('video', { direction: 'recvonly' });
            pc.addTransceiver('audio', { direction: 'recvonly' });

            pc.ontrack = function(event) {
                if (event.streams && event.streams[0]) {
                    videoEl.srcObject = event.streams[0];
                    videoEl.play().catch(function() {});
                    clearTimeout(timeout);
                    currentTransport = 'webrtc';
                    hideOverlay();
                    setControlsEnabled(true);
                    statusEl.textContent = 'Live (WebRTC)';
                    resolve();
                }
            };

            pc.onconnectionstatechange = function() {
                if (pc.connectionState === 'failed' ||
                    pc.connectionState === 'disconnected') {
                    clearTimeout(timeout);
                    if (currentTransport === 'webrtc') {
                        // Was connected, now lost — try reconnect
                        console.warn('WebRTC connection lost, retrying...');
                        destroyStream();
                        startStream(cameraId);
                    }
                }
            };

            // Create SDP offer and send to WHEP endpoint
            pc.createOffer().then(function(offer) {
                return pc.setLocalDescription(offer);
            }).then(function() {
                // Wait for ICE gathering to complete (or timeout after 2s)
                return waitForICE(pc, 2000);
            }).then(function() {
                // POST SDP offer to MediaMTX WHEP endpoint
                return fetch(whepUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/sdp' },
                    body: pc.localDescription.sdp
                });
            }).then(function(response) {
                if (!response.ok) {
                    throw new Error('WHEP POST failed: ' + response.status);
                }
                return response.text();
            }).then(function(sdpAnswer) {
                return pc.setRemoteDescription(
                    new RTCSessionDescription({ type: 'answer', sdp: sdpAnswer })
                );
            }).catch(function(err) {
                clearTimeout(timeout);
                pc.close();
                peerConnection = null;
                reject(err);
            });
        });
    }

    function waitForICE(pc, maxWait) {
        return new Promise(function(resolve) {
            if (pc.iceGatheringState === 'complete') {
                resolve();
                return;
            }
            var done = false;
            var timer = setTimeout(function() {
                if (!done) { done = true; resolve(); }
            }, maxWait);
            pc.onicegatheringstatechange = function() {
                if (pc.iceGatheringState === 'complete' && !done) {
                    done = true;
                    clearTimeout(timer);
                    resolve();
                }
            };
        });
    }

    // ---- HLS fallback ----

    function startHLS(cameraId) {
        var streamUrl = '/live/' + encodeURIComponent(cameraId) + '/stream.m3u8';
        statusEl.textContent = 'Connecting (HLS)...';
        currentTransport = 'hls';

        // Safari native HLS
        if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
            videoEl.src = streamUrl;
            videoEl.addEventListener('loadedmetadata', function onLoaded() {
                videoEl.removeEventListener('loadedmetadata', onLoaded);
                hideOverlay();
                setControlsEnabled(true);
                statusEl.textContent = 'Live (HLS)';
            });
            videoEl.addEventListener('error', function onErr() {
                videoEl.removeEventListener('error', onErr);
                showOverlay('Stream unavailable');
                statusEl.textContent = 'Error';
            });
            videoEl.play().catch(function() {});
            return;
        }

        // HLS.js for Chrome, Firefox, etc.
        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
            hlsInstance = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
                liveSyncDurationCount: 2,
                liveMaxLatencyDurationCount: 4,
            });
            hlsInstance.loadSource(streamUrl);
            hlsInstance.attachMedia(videoEl);

            hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                hideOverlay();
                setControlsEnabled(true);
                statusEl.textContent = 'Live (HLS)';
                videoEl.play().catch(function() {});
            });

            hlsInstance.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) {
                    showOverlay('Stream unavailable');
                    statusEl.textContent = 'Error';
                    hlsInstance.destroy();
                    hlsInstance = null;
                }
            });
        } else {
            showOverlay('Live playback not supported in this browser');
            statusEl.textContent = 'Unsupported';
        }
    }

    // ---- Event listeners ----

    selectEl.addEventListener('change', function() {
        if (selectEl.value) {
            startStream(selectEl.value);
            var url = new URL(window.location);
            url.searchParams.set('camera', selectEl.value);
            history.replaceState(null, '', url.toString());
        }
    });

    btnSnapshot.addEventListener('click', function() {
        var cameraId = selectEl.value;
        if (cameraId) {
            window.open('/api/v1/live/' + encodeURIComponent(cameraId) + '/snapshot', '_blank');
        }
    });

    // --- Mute / unmute ---
    // Stream starts muted (autoplay policy); unmute only on user gesture.
    function refreshMuteIcon() {
        // 🔇 when muted, 🔊 when unmuted.
        btnMuteIcon.textContent = videoEl.muted ? '\u{1F507}' : '\u{1F50A}';
        btnMute.setAttribute(
            'aria-label', videoEl.muted ? 'Unmute' : 'Mute'
        );
        btnMute.setAttribute('title', videoEl.muted ? 'Unmute' : 'Mute');
    }
    btnMute.addEventListener('click', function() {
        videoEl.muted = !videoEl.muted;
        refreshMuteIcon();
    });
    videoEl.addEventListener('volumechange', refreshMuteIcon);

    // --- Picture-in-picture ---
    btnPip.addEventListener('click', function() {
        if (!document.pictureInPictureEnabled) return;
        if (document.pictureInPictureElement === videoEl) {
            document.exitPictureInPicture().catch(function() {});
        } else {
            videoEl.requestPictureInPicture().catch(function() {
                // User gesture required / not supported — silently ignore.
            });
        }
    });

    // --- Fullscreen ---
    // Use the video container so custom overlays (status, snapshot
    // flash) also enter fullscreen, not just the bare <video>.
    var fsTarget = document.getElementById('live-video-container') || videoEl;
    function enterFullscreen() {
        var fn = fsTarget.requestFullscreen ||
                 fsTarget.webkitRequestFullscreen ||
                 videoEl.webkitEnterFullscreen;  // iOS Safari native video
        if (fn) {
            try { fn.call(fsTarget.webkitEnterFullscreen ? videoEl : fsTarget); }
            catch (e) { /* silently ignore — user gesture required */ }
        }
        // Best-effort landscape lock on mobile; wrapped because
        // screen.orientation is undefined on iOS Safari.
        try {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(function() {});
            }
        } catch (e) { /* noop */ }
    }
    function exitFullscreen() {
        var fn = document.exitFullscreen || document.webkitExitFullscreen;
        if (fn) fn.call(document);
    }
    btnFullscreen.addEventListener('click', function() {
        var current = document.fullscreenElement || document.webkitFullscreenElement;
        if (current) { exitFullscreen(); } else { enterFullscreen(); }
    });
    ['fullscreenchange', 'webkitfullscreenchange'].forEach(function(ev) {
        document.addEventListener(ev, function() {
            var active = document.fullscreenElement || document.webkitFullscreenElement;
            btnFullscreen.setAttribute(
                'aria-label', active ? 'Exit fullscreen' : 'Fullscreen'
            );
            btnFullscreen.setAttribute(
                'title', active ? 'Exit fullscreen' : 'Fullscreen'
            );
        });
    });

    refreshMuteIcon();

    function init() { loadCameras(); }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>
{% endblock %}
