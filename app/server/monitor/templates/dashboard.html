{% extends "base.html" %}

{% block title %}Dashboard - Home Monitor{% endblock %}

{% block content %}
<div x-data="dashboardPage()" x-init="init()">
<h1 class="page-title">Dashboard</h1>

<!--
  Tier 1 — Status strip (ADR-0018)
  One banner. State colour + one sentence. A deep link to wherever the
  user needs to go to act on the condition. Green is quiet.
-->
<a class="status-strip" :class="summaryStateClass"
   :href="summary.deep_link || '#'"
   :aria-label="'System status: ' + (summary.state || 'unknown')"
   @click="onStatusClick($event)">
    <span class="status-strip__dot"></span>
    <span class="status-strip__text" x-text="summary.summary || 'Loading system status...'"></span>
    <span class="status-strip__arrow" x-show="summary.state && summary.state !== 'green'">&rarr;</span>
</a>

<!--
  Tier 2 — Four summary tiles (ADR-0018)
  Cameras · Last activity · Storage · Recorder host.
  Each tile shows derived state (badge + one value + one caption), never
  raw metrics. Raw metrics live in Settings → System / Storage.
-->
<div class="tile-grid">

    <!-- Cameras -->
    <a class="tile" href="#cameras-section" :class="tileStateClass('cameras')">
        <div class="tile__label">Cameras</div>
        <div class="tile__value">
            <span x-text="(summary.details && summary.details.cameras) ? summary.details.cameras.online : '\u2014'"></span>
            <span class="tile__value-sub"> / <span x-text="(summary.details && summary.details.cameras) ? summary.details.cameras.total : '\u2014'"></span></span>
        </div>
        <div class="tile__caption" x-text="camerasCaption"></div>
    </a>

    <!-- Last activity -->
    <a class="tile" :href="latestClip ? ('/recordings?camera=' + encodeURIComponent(latestClip.camera_id)) : '/recordings'">
        <div class="tile__label">Last activity</div>
        <div class="tile__value" x-text="latestRelativeTime"></div>
        <div class="tile__caption" x-text="latestCaption"></div>
    </a>

    <!-- Storage -->
    <a class="tile" href="/settings#storage" :class="tileStateClass('storage')">
        <div class="tile__label">Storage</div>
        <div class="tile__value">
            <span x-text="storagePercentLabel"></span>
        </div>
        <div class="tile__caption" x-text="storageCaption"></div>
    </a>

    <!-- Recorder host -->
    <a class="tile" href="/settings#system" :class="tileStateClass('recorder')">
        <div class="tile__label">Recorder host</div>
        <div class="tile__value" x-text="recorderStateLabel"></div>
        <div class="tile__caption" x-text="health.uptime || '\u2014'"></div>
    </a>
</div>

<!--
  Tier 3 (slice 2) — Recent events feed
  Reverse-chronological clip list across every camera. Clicking a row
  opens inline playback using the existing /recordings/<cam>/<date>/<file>
  stream; no navigation, so the dashboard stays the "situational glance"
  surface ADR-0018 describes.
  Slice 3 will turn the Cameras section below into a compact roll-call.
-->
<div class="section-header" x-show="recentEvents.length > 0">
    Recent events
    <a class="text-small" style="float:right;" href="/events">All events &rarr;</a>
</div>
<div class="events-feed" x-show="recentEvents.length > 0">
    <!-- Unified feed: recording clips AND motion events, sorted newest first.
         Each row carries `_type` ('clip' or 'motion') and the UI branches:
           clip  → inline video playback (unchanged)
           motion → opens the click-through router at /events/<id> which
                    redirects to Recordings (if a clip covers it) or Live
                    (if no clip yet / recording was off).
    -->
    <!-- Motion detections + (future) other operator-notable events.
         Click plays the saved clip inline if one is attached; otherwise
         falls back to Live for the camera (motion-detection.md
         click-through rule). -->
    <template x-for="ev in recentEvents" :key="ev._key">
        <div class="event-row" :class="{ 'event-row--active': playingKey === ev._key }">
            <template x-if="ev._type === 'motion'">
                <button class="event-row__trigger" @click="playMotionEvent(ev)">
                    <span class="event-row__type event-row__type--motion">Motion detected</span>
                    <span class="event-row__time" x-text="_relativeTime(ev.started_at)"></span>
                    <span class="event-row__camera" x-text="ev._camera_name || ev.camera_id"></span>
                    <span class="event-row__duration" x-text="_motionLabel(ev)"></span>
                    <span class="event-row__chevron" x-text="(ev.clip_ref ? (playingKey === ev._key ? '\u25BC' : '\u25B6') : '\u25B6')"></span>
                </button>
            </template>
            <template x-if="ev._type === 'motion' && ev.clip_ref && playingKey === ev._key">
                <div class="event-row__player" x-transition>
                    <video x-ref="player"
                           controls autoplay preload="metadata"
                           :src="'/api/v1/recordings/' + encodeURIComponent(ev.clip_ref.camera_id) + '/' + encodeURIComponent(ev.clip_ref.date) + '/' + encodeURIComponent(ev.clip_ref.filename) + '#t=' + (ev.clip_ref.offset_seconds || 0)"></video>
                </div>
            </template>
        </div>
    </template>
</div>

<!--
  Tier-3 (Slice 3) — Audit log teaser
  Five most recent security-relevant events so operators notice a
  login storm / camera dropout / OTA failure without visiting a
  separate log page. Admin-gated — viewers simply don't see it.
  Full log view lives in Settings › Security (future slice).
-->
<!-- Admin-only: render whenever the viewer has the admin gate, even
     when the events list is momentarily empty. Gating on
     `auditEvents.length > 0` as well used to collapse the whole
     section during the render tick between init (empty array) and
     the async /audit/events fetch resolving — which presented as
     "Recent activity broken, nothing shown" even though the API
     returned data fine. -->
<div class="section-header" x-show="auditAdmin">
    Recent activity
    <a class="text-small" style="float:right;" href="/logs">Full log &rarr;</a>
</div>
<div class="log-teaser" x-show="auditAdmin">
    <template x-if="auditEvents.length === 0">
        <div class="log-teaser__row">
            <span class="log-teaser__detail text-muted">No recent activity yet.</span>
        </div>
    </template>
    <template x-for="evt in auditEvents" :key="evt.timestamp + '/' + evt.event">
        <div class="log-teaser__row" :class="_auditEventClass(evt.event)">
            <span class="log-teaser__time" x-text="_relativeTime(evt.timestamp)"></span>
            <span class="log-teaser__event" x-text="_auditEventLabel(evt.event)"></span>
            <span class="log-teaser__detail" x-text="evt.detail || (evt.user ? 'user ' + evt.user : '')"></span>
        </div>
    </template>
</div>

<!-- Cameras roll-call (Tier 3 — to be restyled in Slice 3) -->
<div id="cameras-section" class="section-header">
    Cameras
    <span style="float:right;margin-top:-4px;display:flex;gap:8px;">
        <button class="btn btn--secondary btn--small" @click="scanCameras()" :disabled="scanning">
            <span x-show="!scanning">&#x1F50D; Scan</span>
            <span x-show="scanning">Scanning...</span>
        </button>
        <button class="btn btn--primary btn--small" @click="showAddForm = !showAddForm" x-text="showAddForm ? 'Cancel' : 'Add Camera'"></button>
    </span>
</div>

<!-- Add Camera Form -->
<template x-if="showAddForm">
    <div class="card mb-16">
        <div class="form-group">
            <label for="add-cam-id">Camera ID</label>
            <input class="form-input" id="add-cam-id" x-model="newCam.id" placeholder="e.g. cam-351ad8ee">
        </div>
        <div class="form-group">
            <label for="add-cam-name">Name</label>
            <input class="form-input" id="add-cam-name" x-model="newCam.name" placeholder="e.g. Front Door">
        </div>
        <div class="form-group">
            <label for="add-cam-location">Location</label>
            <input class="form-input" id="add-cam-location" x-model="newCam.location" placeholder="e.g. Outdoor">
        </div>
        <button class="btn btn--primary" @click="addCamera()" :disabled="!newCam.id.trim()">Add Camera</button>
    </div>
</template>

<!-- Pairing PIN Display -->
<template x-if="pairingPin">
    <div class="card mb-16 pairing-pin-card" style="border:1px solid var(--accent);background:var(--bg-card);">
        <div style="text-align:center;margin-bottom:12px;">
            <div style="font-size:0.85em;color:var(--text-muted);margin-bottom:4px;">Enter this PIN on your camera</div>
            <div class="pairing-pin-card__pin" x-text="pairingPin"></div>
            <div style="font-size:0.8em;color:var(--text-muted);margin-top:4px;">
                Camera: <strong x-text="pairingCameraId"></strong>
            </div>
        </div>
        <div style="font-size:0.85em;color:var(--text-secondary);line-height:1.6;margin-bottom:12px;">
            <strong>Steps:</strong><br>
            1. Open the camera's web page (shown after setup)<br>
            2. Go to <strong>Settings</strong> &rarr; <strong>Server Pairing</strong><br>
            3. Enter the 6-digit PIN above<br>
        </div>
        <div style="display:flex;gap:8px;justify-content:center;">
            <button class="btn btn--secondary btn--small" @click="pairingPin = ''; pairingCameraId = '';">Dismiss</button>
        </div>
        <div style="text-align:center;margin-top:8px;font-size:0.75em;color:var(--text-muted);">Expires in 5 minutes</div>
    </div>
</template>

<div class="grid" id="cameras-grid">
    <template x-if="cameras.length === 0 && !showAddForm">
        <div class="empty-state">
            <div class="empty-state__title">No cameras found</div>
            <div class="empty-state__text">Click "&#x1F50D; Scan" to search the local network, or "Add Camera" to register manually.</div>
        </div>
    </template>

    <!-- Discovered cameras (pending pairing) -->
    <template x-if="discoveredCameras.length > 0">
        <div style="grid-column:1/-1;">
            <div class="section-header" style="font-size:0.85em;padding:6px 0 4px;border-bottom:1px solid var(--border);">
                Discovered &#x2014; waiting to pair
                <span class="badge badge--pending" style="margin-left:8px;" x-text="discoveredCameras.length"></span>
            </div>
        </div>
    </template>
    <template x-for="cam in discoveredCameras" :key="cam.id">
        <div class="card camera-card" :data-cam-id="cam.id">
            <div class="camera-card__info">
                <div class="camera-card__name" x-text="cam.name || cam.id"></div>
                <div class="camera-card__location" x-text="cam.ip ? 'IP: ' + cam.ip : 'Detected via mDNS'"></div>
                <div class="camera-card__last-seen" x-show="cam.last_seen">
                    <span x-text="'Seen: ' + _relativeTime(cam.last_seen)"></span>
                </div>
                <div x-show="cam.firmware_version" class="text-small text-muted" x-text="'fw ' + cam.firmware_version"></div>
            </div>
            <div class="camera-card__actions">
                <span class="badge badge--pending">discovered</span>
                <div class="camera-card__btns">
                    <button class="btn btn--primary btn--small" @click.stop="initPairing(cam.id)">Pair</button>
                    <button class="btn btn--danger btn--small btn--icon" @click.stop="deleteCamera(cam.id)">&#x2715;</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Paired cameras (online / offline) -->
    <template x-if="pairedCameras.length > 0 && discoveredCameras.length > 0">
        <div style="grid-column:1/-1;">
            <div class="section-header" style="font-size:0.85em;padding:6px 0 4px;border-bottom:1px solid var(--border);">
                Paired cameras
            </div>
        </div>
    </template>
    <template x-for="cam in pairedCameras" :key="cam.id">
        <div class="card camera-card" :data-cam-id="cam.id">
            <div class="camera-card__info" @click="cam.status === 'online' && (window.location.href = '/live?camera=' + encodeURIComponent(cam.id))" :style="cam.status === 'online' ? 'cursor:pointer' : ''">
                <div class="camera-card__name" x-text="cam.name || cam.id"></div>
                <div class="camera-card__location" x-text="cam.location || 'No location set'"></div>
                <div class="camera-card__meta">
                    <span class="text-small text-muted" x-text="cam.width + 'x' + cam.height + ' @ ' + cam.fps + 'fps'"></span>
                    <span class="text-small" :class="{
                        'text-success': cam.config_sync === 'synced',
                        'text-warning': cam.config_sync === 'pending',
                        'text-danger': cam.config_sync === 'error',
                        'text-muted': cam.config_sync === 'unknown'
                    }" x-show="cam.status !== 'pending'" x-text="cam.config_sync === 'synced' ? '\u2713 synced' : cam.config_sync === 'pending' ? '\u231B pending' : ''"></span>
                </div>
                <div class="camera-card__last-seen" x-show="cam.last_seen">
                    <span :class="{'text-danger': _staleSeconds(cam) > 45, 'text-warning': _staleSeconds(cam) > 30 && _staleSeconds(cam) <= 45}"
                          x-text="'Last seen: ' + _relativeTime(cam.last_seen)"></span>
                </div>
                <div class="camera-card__health" x-show="cam.status === 'online' && (cam.cpu_temp || cam.memory_percent)">
                    <span class="text-small text-muted" x-text="cam.cpu_temp ? cam.cpu_temp.toFixed(1) + '\u00B0C' : ''"></span>
                    <span class="text-small text-muted" x-show="cam.memory_percent" x-text="' \u00B7 ' + cam.memory_percent + '% mem'"></span>
                </div>
            </div>
            <div class="camera-card__actions">
                <span class="badge" :class="{
                    'badge--online': cam.status === 'online',
                    'badge--offline': cam.status === 'offline'
                }" x-text="cam.status"></span>
                <!-- ADR-0017: prefer `stream_state` from heartbeat; fall back
                     to the legacy `streaming` boolean for older cameras. The
                     pulsing dot indicates the camera is actively pushing RTSP
                     to MediaMTX right now (either a viewer is open or the
                     recording scheduler has asked it to stay up). -->
                <span x-show="cam.status === 'online'" class="badge" :class="{
                    'badge--streaming': (cam.stream_state === 'running') || cam.streaming,
                    'badge--not-streaming': !((cam.stream_state === 'running') || cam.streaming)
                }" :aria-label="((cam.stream_state === 'running') || cam.streaming) ? 'live' : 'idle'"
                   x-text="((cam.stream_state === 'running') || cam.streaming) ? '\u25CF live' : '\u25CB idle'"></span>
                <div class="camera-card__btns">
                    <button class="btn btn--secondary btn--small" @click.stop="openStreamSettings(cam)">Settings</button>
                    <button class="btn btn--danger btn--small btn--icon" @click.stop="deleteCamera(cam.id)">&#x2715;</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Stream Settings Modal -->
    <template x-if="editCam">
        <div class="modal-overlay" @click.self="editCam = null">
            <div class="card modal-card">
                <div class="modal-card__header">
                    <span style="font-weight:600" x-text="'Stream Settings \u2014 ' + (editCam.name || editCam.id)"></span>
                    <button class="btn btn--secondary btn--small btn--icon" @click="editCam = null">&#x2715;</button>
                </div>
                <div class="form-group">
                    <label>Resolution</label>
                    <select class="form-input" x-model="editForm.resolution" @change="onResolutionChange()">
                        <option value="640x480">640x480 (max 58 fps)</option>
                        <option value="1296x972">1296x972 (max 43 fps)</option>
                        <option value="1920x1080">1920x1080 (max 30 fps)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Framerate (fps)</label>
                    <input type="number" class="form-input" x-model.number="editForm.fps" min="1" :max="editForm.maxFps">
                    <div class="text-small text-muted" x-text="'Max: ' + editForm.maxFps + ' fps for this resolution'"></div>
                </div>
                <div class="form-group">
                    <label>Bitrate (Mbps)</label>
                    <input type="number" class="form-input" x-model.number="editForm.bitrateMbps" min="0.5" max="8" step="0.5">
                </div>
                <div class="form-group">
                    <label>H.264 Profile</label>
                    <select class="form-input" x-model="editForm.h264_profile">
                        <option value="baseline">Baseline</option>
                        <option value="main">Main</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Keyframe Interval (frames)</label>
                    <input type="number" class="form-input" x-model.number="editForm.keyframe_interval" min="1" max="120">
                </div>
                <div class="form-group">
                    <label>Rotation</label>
                    <select class="form-input" x-model.number="editForm.rotation">
                        <option value="0">0&deg; (Normal)</option>
                        <option value="180">180&deg;</option>
                    </select>
                </div>
                <div class="form-group" style="display:flex;gap:16px;">
                    <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                        <input type="checkbox" x-model="editForm.hflip"> Horizontal Flip
                    </label>
                    <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                        <input type="checkbox" x-model="editForm.vflip"> Vertical Flip
                    </label>
                </div>
                <div style="display:flex;gap:8px;margin-top:12px;">
                    <button class="btn btn--primary" @click="saveStreamSettings()" :disabled="savingStream">
                        <span x-text="savingStream ? 'Saving...' : 'Save & Apply'"></span>
                    </button>
                    <button class="btn btn--secondary" @click="editCam = null">Cancel</button>
                </div>
                <div class="text-small text-muted" style="margin-top:8px;">Changing settings will briefly interrupt the stream (~2-5s).</div>
                <div x-show="streamSaveMsg" class="msg mt-8" :class="streamSaveOk ? 'msg--ok' : 'msg--err'" x-text="streamSaveMsg"></div>
            </div>
        </div>
    </template>
</div>
</div>
{% endblock %}

{% block scripts %}
<script>
function dashboardPage() {
    return {
        // --- ADR-0018 Tier-1 + Tier-2 + Tier-3 state ---
        summary: { state: '', summary: '', deep_link: '/', details: null },
        latestClip: null,
        recentEvents: [],
        playingKey: '',
        health: { uptime: '' },
        auditEvents: [],      // Slice 3 log teaser
        auditAdmin: true,     // becomes false if /audit 403s (viewer role)

        // --- Existing camera-list state (Tier-3 roll-call stub) ---
        cameras: [],
        showAddForm: false,
        newCam: { id: '', name: '', location: '' },
        pairingPin: '',
        pairingCameraId: '',
        scanning: false,
        editCam: null,
        editForm: { resolution: '1920x1080', fps: 25, bitrateMbps: 4, h264_profile: 'high', keyframe_interval: 30, rotation: 0, hflip: false, vflip: false, maxFps: 30 },
        savingStream: false,
        streamSaveMsg: '',
        streamSaveOk: false,

        _summaryInterval: null,
        _cameraInterval: null,

        // Derived lists — split pending (discovered) from paired (online/offline)
        get discoveredCameras() { return this.cameras.filter(c => c.status === 'pending'); },
        get pairedCameras() { return this.cameras.filter(c => c.status !== 'pending'); },

        // --- Tier-1 status strip ---
        get summaryStateClass() {
            var s = this.summary.state || 'green';
            return 'status-strip--' + s;
        },

        // Route a single signal's colour onto the right tile. Keeps the
        // tile-level cue consistent with the top-strip rollup.
        tileStateClass(which) {
            var d = this.summary.details;
            if (!d) return '';
            if (which === 'cameras') {
                return this._camerasTileState(d.cameras);
            }
            if (which === 'storage') {
                return this._storageTileState(d.storage);
            }
            if (which === 'recorder') {
                return this._recorderTileState(d.recorder);
            }
            return '';
        },

        _camerasTileState(c) {
            if (!c || !c.total) return '';
            var offline = c.total - c.online;
            if (offline <= 0) return 'tile--green';
            // Without per-camera last_seen durations we can't distinguish
            // amber/red here — fall back to amber and let the top strip
            // escalate via its own check.
            if (this.summary.state === 'red') return 'tile--red';
            return 'tile--amber';
        },

        _storageTileState(s) {
            if (!s) return '';
            if (s.percent >= 90) return 'tile--red';
            if (s.percent >= 70) return 'tile--amber';
            return 'tile--green';
        },

        _recorderTileState(r) {
            if (!r) return '';
            // Mirror the server thresholds (ADR-0018 locked values).
            if (r.cpu_temp_c >= 80) return 'tile--red';
            if (r.cpu_temp_c >= 72 || r.cpu_percent >= 85 || r.memory_percent >= 85) return 'tile--amber';
            return 'tile--green';
        },

        // --- Tile captions ---
        get camerasCaption() {
            var d = this.summary.details;
            if (!d || !d.cameras) return '\u2014';
            var off = d.cameras.offline_names || [];
            if (off.length === 0) return 'All online';
            if (off.length === 1) return off[0] + ' offline';
            return off.length + ' offline';
        },

        get latestRelativeTime() {
            if (!this.latestClip) return '\u2014';
            // Prefer start_time + date if present.
            var iso = this._clipIso(this.latestClip);
            return iso ? this._relativeTime(iso) : '\u2014';
        },

        get latestCaption() {
            if (!this.latestClip) return 'No recordings yet';
            return this.latestClip.camera_name || this.latestClip.camera_id || '';
        },

        get storagePercentLabel() {
            var s = this.summary.details && this.summary.details.storage;
            if (!s || s.percent === undefined || s.percent === null) return '\u2014';
            return s.percent.toFixed(0) + '%';
        },

        get storageCaption() {
            var s = this.summary.details && this.summary.details.storage;
            if (!s) return '';
            if (s.retention_days !== null && s.retention_days !== undefined) {
                return '~' + s.retention_days + ' days retention';
            }
            if (s.free_gb !== undefined) {
                return s.free_gb + ' GB free';
            }
            return '';
        },

        get recorderStateLabel() {
            var state = this._recorderTileState(this.summary.details && this.summary.details.recorder);
            if (state === 'tile--red') return 'Overheat';
            if (state === 'tile--amber') return 'Under load';
            return 'Nominal';
        },

        onStatusClick(_ev) {
            // Strip always navigates to its deep_link (amber/red → the
            // page that lets the user act; green → "/" which is a no-op
            // while already on the dashboard). Nothing to cancel.
        },

        // --- Loaders ---

        async loadSummary() {
            try {
                this.summary = await window.HM.api.get('/api/v1/system/summary');
            } catch(e) {
                // Leave last-good summary visible; never crash the dashboard.
            }
            // Uptime — still useful on the recorder tile.
            try {
                var info = await window.HM.api.get('/api/v1/system/info');
                this.health.uptime = (info.uptime && info.uptime.display) || '';
            } catch(e) {}
            // Last clip across all cameras (Tier-2 "Last activity" tile).
            try {
                this.latestClip = await window.HM.api.get('/api/v1/recordings/latest');
            } catch(e) {
                this.latestClip = null;
            }
            // Tier-3 recent events feed — MOTION events (and future
            // operator-notable types: CAMERA_OFFLINE, CAMERA_PAIRED, OTA,
            // etc.). Continuous recording clips are deliberately NOT in
            // this feed — they would swamp actual events at 3-min cadence
            // and turn the glance surface into noise. Clip browsing lives
            // at /recordings; "Last activity" tile above covers recorder
            // liveness.
            try {
                var motions = await window.HM.api.get('/api/v1/motion-events?limit=5');
                motions = Array.isArray(motions) ? motions : [];
                var camNameByid = {};
                (this.cameras || []).forEach(function(c) { camNameByid[c.id] = c.name; });
                motions.forEach(function(m) {
                    m._type = 'motion';
                    m._key = 'motion/' + m.id;
                    m._iso = m.started_at;
                    m._camera_name = camNameByid[m.camera_id];
                });
                motions.sort(function(a, b) {
                    return (b._iso || '').localeCompare(a._iso || '');
                });
                this.recentEvents = motions.slice(0, 5);
            } catch(e) {
                this.recentEvents = [];
            }
            // Slice 3 log teaser — last 5 audit events (admin only).
            // Viewers get a 403 here which we silently suppress so the
            // dashboard still renders cleanly.
            try {
                // Fetch more than 5 so we have headroom after filtering
                // motion events out — those live in the Recent events
                // feed above; duplicating them in the security-oriented
                // audit teaser would drown the low-frequency events
                // operators actually need to notice.
                var resp = await window.HM.api.get('/api/v1/audit/events?limit=25');
                var raw = (resp && resp.events) || [];
                this.auditEvents = raw.filter(function(e) {
                    return e.event !== 'MOTION_DETECTED' && e.event !== 'MOTION_ENDED';
                }).slice(0, 5);
                this.auditAdmin = true;
            } catch(e) {
                this.auditEvents = [];
                this.auditAdmin = false;
            }
        },

        // Compact, human-friendly label for a raw audit event code.
        _auditEventLabel(code) {
            if (!code) return '';
            var map = {
                LOGIN_OK: 'Signed in',
                LOGIN_FAILED: 'Login failed',
                LOGOUT: 'Signed out',
                USER_CREATED: 'User created',
                USER_DELETED: 'User deleted',
                PASSWORD_CHANGED: 'Password changed',
                CAMERA_PAIRED: 'Camera paired',
                CAMERA_REMOVED: 'Camera removed',
                CAMERA_OFFLINE: 'Camera went offline',
                CAMERA_ONLINE: 'Camera came online',
                CLIP_DELETED: 'Clip deleted',
                CLIPS_DELETED: 'Clips deleted',
                OTA_STARTED: 'OTA started',
                OTA_COMPLETED: 'OTA completed',
                OTA_FAILED: 'OTA failed',
                FACTORY_RESET: 'Factory reset',
                MOTION_DETECTED: 'Motion detected',
                MOTION_ENDED: 'Motion ended',
            };
            return map[code] || code.toLowerCase().replace(/_/g, ' ');
        },

        _auditEventClass(code) {
            if (!code) return '';
            if (code.endsWith('_FAILED') || code === 'FACTORY_RESET') return 'log-teaser__row--bad';
            if (code === 'LOGIN_FAILED' || code === 'CAMERA_OFFLINE') return 'log-teaser__row--warn';
            return '';
        },

        playMotionEvent(ev) {
            // If a clip is attached, toggle inline playback like a clip
            // row. Otherwise fall back to Live view for the camera.
            if (ev.clip_ref) {
                if (this.playingKey === ev._key) {
                    this.playingKey = '';
                    return;
                }
                this.playingKey = ev._key;
                this.$nextTick(() => {
                    var active = document.querySelector('.event-row--active video');
                    if (active) {
                        try { active.load(); } catch (_) { /* noop */ }
                        var p = active.play();
                        if (p && typeof p.catch === 'function') {
                            p.catch(() => { /* user can press the ▶ control */ });
                        }
                    }
                });
                return;
            }
            // No clip on disk yet → go to Live for this camera.
            window.location.href = '/live?cam=' + encodeURIComponent(ev.camera_id);
        },

        playEvent(ev) {
            // Use the same composite key the template renders (ev._key)
            // so playingKey comparisons match both ways. Fallback for any
            // caller that still passes a raw clip object.
            var key = ev._key || ('clip/' + ev.camera_id + '/' + ev.date + '/' + ev.filename);
            // Toggle — click the same row again to collapse.
            if (this.playingKey === key) {
                this.playingKey = '';
                return;
            }
            this.playingKey = key;
            // The <video> element lives inside an x-for row that was
            // display:none until this click flipped x-show. Browsers do
            // not reliably honour the `autoplay` attribute when an
            // element becomes visible after page load, and our video is
            // unmuted (surveillance footage needs audio). Call .play()
            // explicitly inside the click gesture so the browser's
            // autoplay policy treats this as user-initiated playback.
            this.$nextTick(() => {
                var active = document.querySelector('.event-row--active video');
                if (active) {
                    try { active.load(); } catch (_) { /* noop */ }
                    var p = active.play();
                    if (p && typeof p.catch === 'function') {
                        p.catch(() => { /* user can press the ▶ control */ });
                    }
                }
            });
        },

        _durationLabel(secs) {
            if (!secs || secs <= 0) return '';
            if (secs < 60) return secs + 's';
            var m = Math.floor(secs / 60);
            var s = secs % 60;
            return m + 'm' + (s ? ' ' + s + 's' : '');
        },

        _motionLabel(ev) {
            // Motion event row copy — ongoing events show "ongoing",
            // finished events show their duration, all include the peak
            // score as a rough "how much moved" indicator.
            var bits = [];
            if (ev.ended_at) {
                var d = this._durationLabel(Math.round(ev.duration_seconds || 0));
                if (d) bits.push(d);
            } else {
                bits.push('ongoing');
            }
            if (typeof ev.peak_score === 'number') {
                bits.push(Math.round(ev.peak_score * 100) + '%');
            }
            return bits.join(' \u00B7 ');
        },

        async loadCameras() {
            try {
                this.cameras = await window.HM.api.get('/api/v1/cameras');
            } catch(e) {}
        },

        async scanCameras() {
            this.scanning = true;
            try {
                this.cameras = await window.HM.api.post('/api/v1/cameras/scan', {});
            } catch(e) {
                await this.loadCameras();
            } finally {
                setTimeout(() => { this.scanning = false; }, 1000);
            }
        },

        async addCamera() {
            var id = this.newCam.id.trim();
            if (!id) return;
            try {
                await window.HM.api.post('/api/v1/cameras', {
                    id: id,
                    name: this.newCam.name.trim(),
                    location: this.newCam.location.trim()
                });
                this.newCam = { id: '', name: '', location: '' };
                this.showAddForm = false;
                await this.loadCameras();
            } catch(e) {
                alert(e.message || 'Failed to add camera');
            }
        },

        async initPairing(camId) {
            try {
                var data = await window.HM.api.post('/api/v1/cameras/' + encodeURIComponent(camId) + '/pair', {});
                this.pairingPin = data.pin;
                this.pairingCameraId = camId;
            } catch(e) {
                alert(e.message || 'Failed to initiate pairing');
            }
        },

        async deleteCamera(camId) {
            if (!confirm('Remove this camera?')) return;
            try {
                await window.HM.api.del('/api/v1/cameras/' + encodeURIComponent(camId));
                await this.loadCameras();
            } catch(e) {
                alert(e.message || 'Failed to remove camera');
            }
        },

        // --- Stream Settings (ADR-0015) ---
        _resMaxFps: { '640x480': 58, '1296x972': 43, '1920x1080': 30 },

        openStreamSettings(cam) {
            this.editCam = cam;
            var resKey = cam.width + 'x' + cam.height;
            this.editForm = {
                resolution: resKey,
                fps: cam.fps,
                bitrateMbps: (cam.bitrate / 1000000),
                h264_profile: cam.h264_profile || 'high',
                keyframe_interval: cam.keyframe_interval || 30,
                rotation: cam.rotation || 0,
                hflip: cam.hflip || false,
                vflip: cam.vflip || false,
                maxFps: this._resMaxFps[resKey] || 30,
            };
            this.streamSaveMsg = '';
        },

        onResolutionChange() {
            this.editForm.maxFps = this._resMaxFps[this.editForm.resolution] || 30;
            if (this.editForm.fps > this.editForm.maxFps) {
                this.editForm.fps = this.editForm.maxFps;
            }
        },

        async saveStreamSettings() {
            if (!this.editCam) return;
            this.savingStream = true;
            this.streamSaveMsg = '';
            var parts = this.editForm.resolution.split('x');
            var payload = {
                width: parseInt(parts[0]),
                height: parseInt(parts[1]),
                fps: this.editForm.fps,
                bitrate: Math.round(this.editForm.bitrateMbps * 1000000),
                h264_profile: this.editForm.h264_profile,
                keyframe_interval: this.editForm.keyframe_interval,
                rotation: parseInt(this.editForm.rotation),
                hflip: this.editForm.hflip,
                vflip: this.editForm.vflip,
            };
            try {
                await window.HM.api.put('/api/v1/cameras/' + encodeURIComponent(this.editCam.id), payload);
                this.streamSaveOk = true;
                this.streamSaveMsg = 'Settings saved and pushed to camera.';
                await this.loadCameras();
                setTimeout(() => { this.editCam = null; }, 1500);
            } catch(e) {
                this.streamSaveOk = false;
                this.streamSaveMsg = e.message || 'Failed to save settings';
            } finally {
                this.savingStream = false;
            }
        },

        // --- helpers ---

        _staleSeconds(cam) {
            if (!cam.last_seen) return 0;
            return Math.round((Date.now() - new Date(cam.last_seen).getTime()) / 1000);
        },

        _relativeTime(iso) {
            if (!iso) return '';
            var secs = Math.round((Date.now() - new Date(iso).getTime()) / 1000);
            if (secs < 5) return 'just now';
            if (secs < 60) return secs + 's ago';
            if (secs < 3600) return Math.floor(secs / 60) + 'm ago';
            if (secs < 86400) return Math.floor(secs / 3600) + 'h ago';
            return Math.floor(secs / 86400) + 'd ago';
        },

        _clipIso(clip) {
            // RecorderService clips expose date (YYYY-MM-DD) and start_time
            // (HH:MM:SS). Combine into an ISO string for relative-time calc.
            if (!clip) return '';
            if (clip.started_at) return clip.started_at;
            if (clip.date && clip.start_time) {
                return clip.date + 'T' + clip.start_time;
            }
            return '';
        },

        init() {
            this.loadSummary();
            this.loadCameras();
            // Summary: 10s (matches the existing health cadence; ADR-0018
            // expects the strip to reflect the last heartbeat window).
            // Cameras: 15s (heartbeat cadence).
            this._summaryInterval = setInterval(() => { this.loadSummary(); }, 10000);
            this._cameraInterval = setInterval(() => { this.loadCameras(); }, 15000);
        },

        destroy() {
            if (this._summaryInterval) clearInterval(this._summaryInterval);
            if (this._cameraInterval) clearInterval(this._cameraInterval);
        }
    };
}
</script>
