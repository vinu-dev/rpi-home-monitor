# HTTP — needed for setup wizard (phone on hotspot, no TLS)
# Also serves normal traffic; users can bookmark HTTPS after setup.
server {
    listen 80;
    server_name _;

    # --- Captive portal detection ---
    # Phones probe these URLs to detect captive portals.
    # Redirecting to the setup wizard triggers the "Sign in to network" popup.
    # iOS: captive.apple.com/hotspot-detect.html
    location = /hotspot-detect.html { return 302 http://$host/api/v1/setup/wizard; }
    # Android: connectivitycheck.gstatic.com/generate_204
    location = /generate_204 { return 302 http://$host/api/v1/setup/wizard; }
    # Windows: www.msftconnecttest.com/connecttest.txt
    location = /connecttest.txt { return 302 http://$host/api/v1/setup/wizard; }
    # Firefox: detectportal.firefox.com/canonical.html
    location = /canonical.html { return 302 http://$host/api/v1/setup/wizard; }
    # Firefox alt
    location = /success.txt { return 302 http://$host/api/v1/setup/wizard; }
    # Samsung
    location = /gen_204 { return 302 http://$host/api/v1/setup/wizard; }

    # 502 handler — Flask not ready yet, auto-refresh until it is
    error_page 502 /502.html;
    location = /502.html {
        internal;
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="refresh" content="3"><title>Starting...</title><style>body{background:#1a1a2e;color:#e0e0e0;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}.card{background:#16213e;border-radius:12px;padding:32px;text-align:center;max-width:320px}h2{color:#fff;margin-bottom:12px}.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.2);border-top-color:#e94560;border-radius:50%;animation:s .7s linear infinite;margin:0 auto 16px}@keyframes s{to{transform:rotate(360deg)}}</style></head><body><div class="card"><div class="spinner"></div><h2>Starting Up</h2><p>Home Monitor is loading...<br>This page will refresh automatically.</p></div></body></html>';
    }

    # Setup wizard + CA cert endpoint — must stay on HTTP.
    # /setup/ca-cert is also needed over HTTP so cameras can fetch the server
    # CA cert before they have a TLS context to verify with (TOFU bootstrap).
    location /api/v1/setup/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets — needed for setup page styling
    location /static/ {
        alias /opt/monitor/monitor/static/;
        expires 1d;
        gzip on;
        gzip_types text/css application/javascript;
    }

    # Everything else: redirect to HTTPS (login, dashboard, API, etc.)
    # During setup the phone connects via hotspot (HTTP only, no cert).
    # After setup, users access via HTTPS where session cookies work.
    location / {
        return 301 https://$host$request_uri;
    }

    # Upload size for OTA images
    client_max_body_size 500M;

    # Timeouts for streaming
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
}

# HTTPS — secure access after setup
server {
    listen 443 ssl;
    server_name _;

    # TLS — self-signed cert from local CA
    ssl_certificate     /data/certs/server.crt;
    ssl_certificate_key /data/certs/server.key;
    ssl_protocols       TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # Content Security Policy — restricts resource origins to prevent XSS.
    # 'unsafe-inline' is required for Alpine.js directives and inline styles in templates.
    # 'unsafe-eval' is REQUIRED for Alpine.js v3: it uses the Function() constructor
    #   to evaluate reactive expressions (x-data, x-text, @click). Without it, the
    #   entire dashboard breaks silently — tabs don't respond, metrics stay empty.
    #   Alpine's CSP-safe build is an alternative but would require rewriting all
    #   templates to avoid expression strings.
    # blob: in media-src/img-src is required for HLS.js and snapshot display.
    # wss: in connect-src is required for future WebSocket health updates.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' wss:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # 502 handler — Flask not ready yet, auto-refresh until it is
    error_page 502 /502.html;
    location = /502.html {
        internal;
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="refresh" content="3"><title>Starting...</title><style>body{background:#1a1a2e;color:#e0e0e0;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}.card{background:#16213e;border-radius:12px;padding:32px;text-align:center;max-width:320px}h2{color:#fff;margin-bottom:12px}.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.2);border-top-color:#e94560;border-radius:50%;animation:s .7s linear infinite;margin:0 auto 16px}@keyframes s{to{transform:rotate(360deg)}}</style></head><body><div class="card"><div class="spinner"></div><h2>Starting Up</h2><p>Home Monitor is loading...<br>This page will refresh automatically.</p></div></body></html>';
    }

    # Proxy to Flask app
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Video content — all proxied through Flask for session auth.
    # Flask enforces @login_required on every request. No direct
    # file serving of video content — prevents unauthenticated access.

    # HLS live segments — proxied to Flask (auth enforced).
    # Regex matches /live/<camera-id>/<file> but NOT bare /live or /live?...
    # so the Flask HTML view at /live?camera=X still routes through location /
    location ~ ^/live/([^/]+/.+)$ {
        proxy_pass http://127.0.0.1:5000/api/v1/live/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Recorded clips — proxied to Flask (auth enforced)
    location ~ ^/clips/(.+)$ {
        proxy_pass http://127.0.0.1:5000/api/v1/recordings/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Thumbnails — proxied to Flask (auth enforced)
    location ~ ^/snapshots/(.+)$ {
        proxy_pass http://127.0.0.1:5000/api/v1/recordings/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebRTC WHEP — proxied straight to MediaMTX's WHEP listener on :8889.
    # MediaMTX expects POST /<path>/whep with an SDP body and returns an
    # SDP answer. Browser viewers connect through nginx so the TLS origin
    # matches the app (no mixed-content warnings).
    location ~ ^/webrtc/(?<mtx_path>[^/]+)/whep$ {
        proxy_pass http://127.0.0.1:8889/$mtx_path/whep;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Static assets
    location /static/ {
        alias /opt/monitor/monitor/static/;
        expires 1d;
        gzip on;
        gzip_types text/css application/javascript;
    }

    # Upload size for OTA images
    client_max_body_size 500M;

    # Timeouts for streaming
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
}
