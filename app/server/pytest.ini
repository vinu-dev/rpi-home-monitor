[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    -v
    --timeout=30
markers =
    unit: pure logic tests with no real network, process, or hardware
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: route and service wiring tests with mocked external dependencies
    contract: OpenAPI and response-shape contract tests
    security: tests for auth, pairing, TLS, sessions, and adversarial cases
    e2e: browser-driven end-to-end tests
    hardware: hardware-in-the-loop tests
    ota: over-the-air update and rollback tests
    soak: reliability and endurance tests
