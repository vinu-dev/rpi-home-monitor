[mutmut]
# Mutation test only the core business logic — skip platform I/O, Linux-only
# modules, and code that needs subprocess/sysfs to run (health, tailscale, wifi).
# These are tested via mocks; mutating them produces false survivors.
paths_to_mutate =
    monitor/api/cameras.py
    monitor/api/pairing.py
    monitor/api/recordings.py
    monitor/api/settings.py
    monitor/api/users.py
    monitor/api/webrtc.py
    monitor/api/on_demand.py
    monitor/api/audit.py
    monitor/auth.py
    monitor/models.py
    monitor/password_policy.py
    monitor/store.py
    monitor/services/camera_service.py
    monitor/services/pairing_service.py
    monitor/services/recordings_service.py
    monitor/services/user_service.py
    monitor/services/storage_manager.py
    monitor/services/audit.py
    monitor/services/system_summary_service.py
    monitor/services/settings_service.py
runner = python -m pytest tests/unit tests/integration -x -q --timeout=30
tests_dir = tests
