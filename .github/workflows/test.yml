# REQ: SWR-048, SWR-055; RISK: RISK-009, RISK-019; SEC: SC-009, SC-018; TEST: TC-045
name: PR CI

on:
  push:
    branches: ["**"]
    paths:
      - "app/**"
      - "meta-home-monitor/**"
      - "config/**"
      - "swupdate/**"
      - "docs/**"
      - ".github/**"
      - ".claude/**"
      - ".cursor/**"
      - ".qodo/**"
      - "scripts/**"
      - "tests/**"
      - "openapi/**"
      - "package.json"
      - "playwright.config.ts"
      - "README.md"
      - "CHANGELOG.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".pre-commit-config.yaml"
      - ".gitattributes"
      - "pyproject.toml"
      - "pytest.ini"
  pull_request:
    paths:
      - "app/**"
      - "meta-home-monitor/**"
      - "config/**"
      - "swupdate/**"
      - "docs/**"
      - ".github/**"
      - ".claude/**"
      - ".cursor/**"
      - ".qodo/**"
      - "scripts/**"
      - "tests/**"
      - "openapi/**"
      - "package.json"
      - "playwright.config.ts"
      - "README.md"
      - "CHANGELOG.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".pre-commit-config.yaml"
      - ".gitattributes"
      - "pyproject.toml"
      - "pytest.ini"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      yocto: ${{ steps.filter.outputs.yocto }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            yocto:
              - "meta-home-monitor/**"
              - "config/**"
              - "swupdate/**"
              - "scripts/build*.sh"
              - "scripts/generate-ota-keys.sh"
              - "scripts/restore-ota-keys.sh"

  repo-governance:
    name: Repo Governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python tools/docs/check_doc_map.py
          python scripts/ai/validate_repo_ai_setup.py
          python scripts/ai/check_doc_links.py
          python scripts/ai/check_shell_scripts.py
          python scripts/check_version_consistency.py
          python scripts/check_versioning_design.py

  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    env:
      SKIP: no-commit-to-branch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install pre-commit
          pre-commit run --all-files

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/actionlint@v1.7.12

  shell-lint:
    name: Shell Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          bash -n scripts/*.sh
          shellcheck -S warning -e SC1091,SC1111,SC2012,SC2034 scripts/*.sh

  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install ruff
          ruff check .
          ruff format --check .

  server-unit:
    name: Server Unit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/server/requirements-test.txt
      - run: |
          pip install -e . -r requirements-test.txt
          pytest tests/unit -n auto --junitxml=unit-results.xml

  server-integration:
    name: Server Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/server/requirements-test.txt
      - run: |
          pip install -e . -r requirements-test.txt
          pytest tests/integration -n auto --junitxml=integration-results.xml

  server-contract:
    name: Server Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/server/requirements-test.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -e app/server -r app/server/requirements-test.txt
          pytest app/server/tests/contracts --junitxml=server-contract-results.xml
      - name: Run Schemathesis against server API
        shell: bash
        run: |
          set -euo pipefail
          python scripts/testing/run_server_app.py --mode seeded --port 5443 > server-helper.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          for _ in {1..60}; do
            if curl -skf https://127.0.0.1:5443/login >/dev/null; then
              break
            fi
            sleep 1
          done
          eval "$(python - <<'PY'
          import requests

          session = requests.Session()
          response = session.post(
              'https://127.0.0.1:5443/api/v1/auth/login',
              json={'username': 'admin', 'password': 'pass1234'},
              verify=False,
              timeout=10,
          )
          response.raise_for_status()
          csrf = response.json()['csrf_token']
          cookie = '; '.join(f'{k}={v}' for k, v in session.cookies.get_dict().items())
          print(f"COOKIE={cookie!r}")
          print(f"CSRF={csrf!r}")
          PY
          )"
          # NOTE: fuzzing phase is disabled because it surfaces ~33 pre-existing
          # OpenAPI-vs-implementation gaps (auth, status codes, schema rejects).
          # Enabling it here is tracked as a separate hardening pass.
          schemathesis run openapi/server.yaml \
            --url https://127.0.0.1:5443 \
            --tls-verify=false \
            -H "Cookie:$COOKIE" \
            -H "X-CSRF-Token:$CSRF" \
            --phases=examples

  server-security:
    name: Server Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/server/requirements-test.txt
      - run: |
          pip install -e . -r requirements-test.txt
          pytest tests/security -n auto --junitxml=security-results.xml

  server-coverage:
    name: Server Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/server/requirements-test.txt
      - run: |
          pip install -e . -r requirements-test.txt
          pytest tests/unit tests/integration tests/security \
            --cov=monitor \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            --junitxml=coverage-results.xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: server
          name: server-coverage
          fail_ci_if_error: false

  server-mutation:
    name: Server Mutation
    # Skipped by default — mutmut runs sequentially and each mutant triggers a
    # full pytest suite, so even a small paths_to_mutate surface can take
    # 30–60+ min. Re-enable by setting `vars.RUN_SERVER_MUTATION == 'true'` at
    # the repo/org level, or running the workflow manually once tooling parallelizes.
    if: ${{ vars.RUN_SERVER_MUTATION == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/server/requirements-test.txt
      - run: |
          pip install -e . -r requirements-test.txt
          mutmut run || true
      - name: Check mutation kill rate
        run: |
          python - <<'PY'
          import sqlite3, sys, pathlib

          db = pathlib.Path(".mutmut-cache")
          if not db.exists():
              print("No .mutmut-cache found — mutmut may have failed to run")
              sys.exit(1)

          conn = sqlite3.connect(db)
          try:
              rows = dict(
                  conn.execute(
                      "SELECT status, count(*) FROM mutant_statuses GROUP BY status"
                  ).fetchall()
              )
          except sqlite3.OperationalError as e:
              print(f"Could not read mutmut cache: {e}")
              sys.exit(1)
          finally:
              conn.close()

          killed = rows.get("ok_killed", 0)
          survived = rows.get("bad_survived", 0) + rows.get("ok_suspicious", 0)
          timed_out = rows.get("bad_timeout", 0)
          total = killed + survived + timed_out

          print(f"Killed: {killed}  Survived: {survived}  Timed out: {timed_out}")
          if total == 0:
              print("No mutants processed — check paths_to_mutate in setup.cfg")
              sys.exit(1)

          kill_rate = killed / total * 100
          print(f"Kill rate: {kill_rate:.1f}% ({killed}/{total})")
          if kill_rate < 70:
              print(f"FAIL: kill rate {kill_rate:.1f}% is below the 70% threshold")
              sys.exit(1)
          print("PASS")
          PY

  camera-unit:
    name: Camera Unit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/camera
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/camera/requirements-test.txt
      - run: |
          pip install -e . -r requirements-test.txt
          pytest tests/unit -n auto --junitxml=unit-results.xml

  camera-integration:
    name: Camera Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/camera
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/camera/requirements-test.txt
      - run: |
          pip install -e . -r requirements-test.txt
          pytest tests/integration -n auto --junitxml=integration-results.xml

  camera-contract:
    name: Camera Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/camera/requirements-test.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -e app/camera -r app/camera/requirements-test.txt
          pytest app/camera/tests/contracts --junitxml=camera-contract-results.xml
      - name: Run Schemathesis against camera API
        shell: bash
        run: |
          set -euo pipefail
          python scripts/testing/run_camera_status_server.py --port 5444 > camera-helper.log 2>&1 &
          CAMERA_PID=$!
          trap 'kill $CAMERA_PID || true' EXIT
          for _ in {1..60}; do
            if curl -skf https://127.0.0.1:5444/login >/dev/null; then
              break
            fi
            sleep 1
          done
          eval "$(python - <<'PY'
          import requests

          session = requests.Session()
          response = session.post(
              'https://127.0.0.1:5444/login',
              json={'username': 'admin', 'password': 'pass1234'},
              verify=False,
              timeout=10,
          )
          response.raise_for_status()
          cookie = '; '.join(f'{k}={v}' for k, v in session.cookies.get_dict().items())
          print(f"COOKIE={cookie!r}")
          PY
          )"
          # NOTE: fuzzing phase disabled — same reason as server-contract.
          schemathesis run openapi/camera.yaml \
            --url https://127.0.0.1:5444 \
            --tls-verify=false \
            -H "Cookie:$COOKIE" \
            --phases=examples

  camera-security:
    name: Camera Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/camera
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/camera/requirements-test.txt
      - run: |
          pip install -e . -r requirements-test.txt
          pytest tests/security -n auto --junitxml=security-results.xml

  camera-coverage:
    name: Camera Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/camera
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/camera/requirements-test.txt
      - run: |
          pip install -e . -r requirements-test.txt
          pytest tests/unit tests/integration tests/security \
            --cov=camera_streamer \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --junitxml=coverage-results.xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: camera
          name: camera-coverage
          fail_ci_if_error: false

  browser-e2e-smoke:
    name: Browser E2E Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          python -m pip install --upgrade pip
          pip install -e app/server -r app/server/requirements-test.txt
          pip install -e app/camera -r app/camera/requirements-test.txt
          npm install
          npx playwright install --with-deps chromium
          npx playwright test --project=smoke
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results

  yocto-parse:
    name: Yocto Parse
    needs: changes
    if: needs.changes.outputs.yocto == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install pytest
          python -m pytest tests/yocto -k "parse"
