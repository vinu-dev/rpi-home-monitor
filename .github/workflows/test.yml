name: CI

on:
  push:
    paths:
      - "app/**"
      - "meta-home-monitor/**"
      - "config/**"
      - "swupdate/**"
      - "docs/**"
      - ".github/**"
      - ".claude/**"
      - ".cursor/**"
      - ".qodo/**"
      - "scripts/**"
      - "README.md"
      - "CHANGELOG.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".pre-commit-config.yaml"
      - ".gitattributes"
      - ".github/workflows/test.yml"
      - "pyproject.toml"
  pull_request:
    paths:
      - "app/**"
      - "meta-home-monitor/**"
      - "config/**"
      - "swupdate/**"
      - "docs/**"
      - ".github/**"
      - ".claude/**"
      - ".cursor/**"
      - ".qodo/**"
      - "scripts/**"
      - "README.md"
      - "CHANGELOG.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".pre-commit-config.yaml"
      - ".gitattributes"
      - ".github/workflows/test.yml"
      - "pyproject.toml"

jobs:
  ai-governance:
    name: AI Governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate AI repo setup
        run: |
          python scripts/ai/validate_repo_ai_setup.py
          python scripts/ai/check_doc_links.py
          python scripts/ai/check_shell_scripts.py

  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit
      - name: Run pre-commit
        run: |
          pre-commit run --all-files

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/actionlint@v1.7.12

  shell-lint:
    name: Shell Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Bash syntax check
        run: |
          bash -n scripts/*.sh
      - name: ShellCheck
        run: |
          shellcheck -S warning -e SC1091,SC1111,SC2012,SC2034 scripts/*.sh

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Ruff check
        run: |
          ruff check .
      - name: Ruff format check
        run: |
          ruff format --check .

  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/server

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/server/requirements-test.txt
      - name: Install dependencies
        run: |
          pip install -e . -r requirements-test.txt
      - name: Run tests with coverage
        run: |
          pytest --cov-fail-under=80 --cov-report=term-missing --cov-report=xml:coverage.xml --junitxml=results.xml
      - name: Coverage report as PR comment
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: orgoro/coverage@v3.2
        with:
          coverageFile: app/server/coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.80

  camera-tests:
    name: Camera Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/camera

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/camera/requirements-test.txt
      - name: Install dependencies
        run: |
          pip install -e . -r requirements-test.txt
      - name: Run tests with coverage
        run: |
          pytest --cov-fail-under=70 --cov-report=term-missing --cov-report=xml:coverage.xml --junitxml=results.xml
      - name: Coverage report as PR comment
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: orgoro/coverage@v3.2
        with:
          coverageFile: app/camera/coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.70
